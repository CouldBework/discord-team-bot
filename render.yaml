services:
  - type: worker
    name: discord-team-bot
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: TARGET_GUILD_ID
        sync: false
      - key: COMMAND_SCOPE
        value: guild
      - key: NODE_ENV
        value: production
      - key: REROLL_TTL_MINUTES
        value: 720
